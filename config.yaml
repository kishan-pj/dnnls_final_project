dataset:
  name: StoryReasoning
  split_train: train
  split_test: test
  max_len: 120
  image_size : [60,125]
  K_frames: 4 

training:
  batch_size: 8
  lr: 0.001
  epochs: 5
  num_workers: 2

model:
  latent_dim: 16
  gru_hidden_dim: 16

loss:
  contrastive_tau: 0.07
  lambda_reid: 0.10
  lambda_ground_mse: 0.10
  lambda_contrast: 0.10
  lambda_entity_pool: 0.05

flags:
# Baseline Architecture
  use_frame_aware_grounding: false
  use_contrastive_roi: false
  use_entity_pooling: false 
  use_cot_text: false

# Future Experiments
  use_cross_attention: false
  use_bidirectional: false 

